<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zico Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="calculator" aria-label="Calculator">
        <header class="calculator__header">
          <p class="calculator__eyebrow">Zico</p>
          <h1>Calculator</h1>
        </header>

        <div class="display" role="status" aria-live="polite">
          <p class="display__expression" data-expression>0</p>
          <p class="display__result" data-result>0</p>
        </div>

        <div class="keypad" aria-label="Calculator controls">
          <button type="button" class="key key--action" data-action="clear">C</button>
          <button type="button" class="key key--action" data-action="delete">DEL</button>
          <button type="button" class="key key--operator" data-value="(">(</button>
          <button type="button" class="key key--operator" data-value=")">)</button>

          <button type="button" class="key" data-value="7">7</button>
          <button type="button" class="key" data-value="8">8</button>
          <button type="button" class="key" data-value="9">9</button>
          <button type="button" class="key key--operator" data-value="/">/</button>

          <button type="button" class="key" data-value="4">4</button>
          <button type="button" class="key" data-value="5">5</button>
          <button type="button" class="key" data-value="6">6</button>
          <button type="button" class="key key--operator" data-value="*">*</button>

          <button type="button" class="key" data-value="1">1</button>
          <button type="button" class="key" data-value="2">2</button>
          <button type="button" class="key" data-value="3">3</button>
          <button type="button" class="key key--operator" data-value="-">-</button>

          <button type="button" class="key key--wide" data-value="0">0</button>
          <button type="button" class="key" data-value=".">.</button>
          <button type="button" class="key key--operator" data-value="+">+</button>

          <button type="button" class="key key--equals" data-action="evaluate">=</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
